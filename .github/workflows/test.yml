name: Test

on:
  pull_request:
    branches:
      - master

jobs:
  translate:
    runs-on: ubuntu-24.04
    name: Run Translations
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run translation scripts
        working-directory: translate
        run: |
          node translate.js || true
          node translate.js extractall
          node translate.js minifyall
          node translate.js translateall

      - name: Upload translated repository
        uses: actions/upload-artifact@v4
        with:
          name: repo-with-translations
          path: .
          retention-days: 1

  build:
    runs-on: ubuntu-24.04
    needs: translate
    name: Build Docker Image (test)
    steps:
      - name: Download translated repository
        uses: actions/download-artifact@v4
        with:
          name: repo-with-translations

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (Alpine slim, amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            INCLUDE_MONGODB_TOOLS=NO
            INCLUDE_POSTGRESQL_TOOLS=NO
            INCLUDE_MARIADB_TOOLS=NO
            DISABLE_MINIFY=yes
            DISABLE_TRANSLATE=yes
            DISABLE_EXTRACT=yes
            PREINSTALL_LIBS=true
          tags: meshcentral:test

      - name: Build Docker image (Debian slim, amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile-debian
          platforms: linux/amd64
          push: false
          build-args: |
            INCLUDE_MONGODB_TOOLS=NO
            INCLUDE_POSTGRESQL_TOOLS=NO
            INCLUDE_MARIADB_TOOLS=NO
            DISABLE_MINIFY=yes
            DISABLE_TRANSLATE=yes
            DISABLE_EXTRACT=yes
            PREINSTALL_LIBS=true
          tags: meshcentral:test-debian
