name: Release

# =============================================================================
# WORKFLOW CONFIGURATION
# =============================================================================

permissions:
  contents: write
  packages: write
  actions: write
  pull-requests: write
  attestations: write
  id-token: write

on:
  push:
    branches: [master, feature/rebased]
    paths:
      - 'docker/**'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to Release (e.g., v1.2.3)"
        required: false
        type: string

env:
  REGISTRY: "ghcr.io"
  ORGANISATION: ${{ github.repository_owner }}
  IMAGE_NAME: meshcentral

# =============================================================================
# JOBS
# =============================================================================

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORGANISATION }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
          labels: |
            org.opencontainers.image.vendor=${{ env.ORGANISATION }}
            org.opencontainers.image.description=MeshCentral remote management server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MESH_DIR=/opt/mesh

      - name: Cleanup old container versions
        if: steps.docker_build.outcome == 'success'
        uses: dataaxiom/ghcr-cleanup-action@v1
        continue-on-error: true
        with:
          package: ${{ env.IMAGE_NAME }}
          delete-ghost-images: true
          delete-tags: '.*'
          exclude-tags: '^(?:[0-9]+\.[0-9]+\.[0-9]+|latest|v[0-9]+\.[0-9]+\.[0-9]+)$'
          use-regex: true

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: inputs.version != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release header
        run: |
          VERSION="${{ inputs.version }}"
          cat > RELEASE_HEADER.md <<EOF
          ## Docker Image
          - \`${{ env.REGISTRY }}/${{ env.ORGANISATION }}/${{ env.IMAGE_NAME }}:${VERSION}\`
          - \`${{ env.REGISTRY }}/${{ env.ORGANISATION }}/${{ env.IMAGE_NAME }}:latest\`

          ## Usage
          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${{ env.ORGANISATION }}/${{ env.IMAGE_NAME }}:${VERSION}
          \`\`\`
          ---
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "🖥️ ${{ inputs.version }}"
          draft: false
          prerelease: ${{ github.event_name == 'push' }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: RELEASE_HEADER.md

      - name: Force update latest tag
        if: github.event_name == 'push'
        run: git tag -f latest && git push -f origin latest
