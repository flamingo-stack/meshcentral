name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3). Leave empty to build latest only.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: meshcentral

permissions:
  contents: write
  packages: write

jobs:
  translate:
    runs-on: ubuntu-latest
    name: Run Translations
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run translation scripts
        working-directory: translate
        run: |
          node translate.js || true
          node translate.js extractall
          node translate.js minifyall
          node translate.js translateall

      - name: Upload translated repository
        uses: actions/upload-artifact@v4
        with:
          name: repo-with-translations
          path: .
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    needs: translate
    strategy:
      matrix:
        include:
          - base: alpine
            dockerfile: docker/Dockerfile
          - base: debian
            dockerfile: docker/Dockerfile-debian
          - variant: mongodb
            mongodb: YES
            postgresql: NO
            mariadb: NO
            suffix: -mongodb
          - variant: postgresql
            mongodb: NO
            postgresql: YES
            mariadb: NO
            suffix: -postgresql
          - variant: mariadb
            mongodb: NO
            postgresql: NO
            mariadb: YES
            suffix: -mariadb
          - variant: all
            mongodb: YES
            postgresql: YES
            mariadb: YES
            suffix: ""
          - variant: slim
            mongodb: NO
            postgresql: NO
            mariadb: NO
            suffix: -slim
        base: [alpine, debian]
        variant: [mongodb, postgresql, mariadb, all, slim]
    name: Build ${{ matrix.base }}-${{ matrix.variant }}
    steps:
      - name: Download translated repository
        uses: actions/download-artifact@v4
        with:
          name: repo-with-translations

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            INCLUDE_MONGODB_TOOLS=${{ matrix.mongodb }}
            INCLUDE_POSTGRESQL_TOOLS=${{ matrix.postgresql }}
            INCLUDE_MARIADB_TOOLS=${{ matrix.mariadb }}
            DISABLE_MINIFY=yes
            DISABLE_TRANSLATE=yes
            DISABLE_EXTRACT=yes
            PREINSTALL_LIBS=true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ inputs.version || 'latest' }}${{ matrix.suffix }}${{ matrix.base == 'debian' && '-debian' || '' }}

  release:
    runs-on: ubuntu-latest
    needs: build
    if: inputs.version != ''
    name: Create GitHub Release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
