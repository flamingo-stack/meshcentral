name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3). Leave empty to build latest only.'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: meshcentral

permissions:
  contents: write
  packages: write

jobs:
  translate:
    runs-on: ubuntu-24.04
    name: Run Translations
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run translation scripts
        working-directory: translate
        run: |
          node translate.js || true
          node translate.js extractall
          node translate.js minifyall
          node translate.js translateall

      - name: Upload translated repository
        uses: actions/upload-artifact@v4
        with:
          name: repo-with-translations
          path: .
          retention-days: 1

  build:
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    needs: translate
    strategy:
      fail-fast: false
      matrix:
        base: [alpine, debian]
        variant: [mongodb, postgresql, mariadb, all, slim]
        arch: [amd64, arm64]
    name: Build ${{ matrix.base }}-${{ matrix.variant }}-${{ matrix.arch }}
    steps:
      - name: Download translated repository
        uses: actions/download-artifact@v4
        with:
          name: repo-with-translations

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build variables
        id: vars
        run: |
          REPO_OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "repo_owner_lc=$REPO_OWNER_LC" >> $GITHUB_OUTPUT

          # Set database tool flags based on variant
          case "${{ matrix.variant }}" in
            mongodb)
              echo "mongodb=YES" >> $GITHUB_OUTPUT
              echo "postgresql=NO" >> $GITHUB_OUTPUT
              echo "mariadb=NO" >> $GITHUB_OUTPUT
              echo "variant_suffix=-mongodb" >> $GITHUB_OUTPUT
              ;;
            postgresql)
              echo "mongodb=NO" >> $GITHUB_OUTPUT
              echo "postgresql=YES" >> $GITHUB_OUTPUT
              echo "mariadb=NO" >> $GITHUB_OUTPUT
              echo "variant_suffix=-postgresql" >> $GITHUB_OUTPUT
              ;;
            mariadb)
              echo "mongodb=NO" >> $GITHUB_OUTPUT
              echo "postgresql=NO" >> $GITHUB_OUTPUT
              echo "mariadb=YES" >> $GITHUB_OUTPUT
              echo "variant_suffix=-mariadb" >> $GITHUB_OUTPUT
              ;;
            all)
              echo "mongodb=YES" >> $GITHUB_OUTPUT
              echo "postgresql=YES" >> $GITHUB_OUTPUT
              echo "mariadb=YES" >> $GITHUB_OUTPUT
              echo "variant_suffix=" >> $GITHUB_OUTPUT
              ;;
            slim)
              echo "mongodb=NO" >> $GITHUB_OUTPUT
              echo "postgresql=NO" >> $GITHUB_OUTPUT
              echo "mariadb=NO" >> $GITHUB_OUTPUT
              echo "variant_suffix=-slim" >> $GITHUB_OUTPUT
              ;;
          esac

          # Set base suffix for debian
          if [ "${{ matrix.base }}" = "debian" ]; then
            echo "base_suffix=-debian" >> $GITHUB_OUTPUT
            echo "dockerfile=docker/Dockerfile-debian" >> $GITHUB_OUTPUT
          else
            echo "base_suffix=" >> $GITHUB_OUTPUT
            echo "dockerfile=docker/Dockerfile" >> $GITHUB_OUTPUT
          fi

          # Determine tag prefix (version or latest)
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag_prefix=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag_prefix=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.vars.outputs.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            INCLUDE_MONGODB_TOOLS=${{ steps.vars.outputs.mongodb }}
            INCLUDE_POSTGRESQL_TOOLS=${{ steps.vars.outputs.postgresql }}
            INCLUDE_MARIADB_TOOLS=${{ steps.vars.outputs.mariadb }}
            DISABLE_MINIFY=yes
            DISABLE_TRANSLATE=yes
            DISABLE_EXTRACT=yes
            PREINSTALL_LIBS=true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.repo_owner_lc }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag_prefix }}${{ steps.vars.outputs.variant_suffix }}${{ steps.vars.outputs.base_suffix }}-${{ matrix.arch }}

  manifest:
    runs-on: ubuntu-24.04
    needs: build
    name: Create Multi-Arch Manifests
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          REPO_OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${{ env.REGISTRY }}/$REPO_OWNER_LC/${{ env.IMAGE_NAME }}"

          # Determine tag prefix
          if [ -n "${{ inputs.version }}" ]; then
            TAG_PREFIX="${{ inputs.version }}"
          else
            TAG_PREFIX="latest"
          fi

          # Define variants and bases
          VARIANTS=("mongodb" "postgresql" "mariadb" "" "slim")
          VARIANT_SUFFIXES=("-mongodb" "-postgresql" "-mariadb" "" "-slim")
          BASES=("" "-debian")

          for i in "${!VARIANTS[@]}"; do
            VARIANT_SUFFIX="${VARIANT_SUFFIXES[$i]}"
            for BASE_SUFFIX in "${BASES[@]}"; do
              TAG="${TAG_PREFIX}${VARIANT_SUFFIX}${BASE_SUFFIX}"
              echo "Creating manifest for $TAG"
              docker buildx imagetools create \
                -t "$IMAGE:$TAG" \
                "$IMAGE:${TAG}-amd64" \
                "$IMAGE:${TAG}-arm64"
            done
          done

  release:
    runs-on: ubuntu-24.04
    needs: manifest
    if: inputs.version != ''
    name: Create GitHub Release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
