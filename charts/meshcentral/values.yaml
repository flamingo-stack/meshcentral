
image:
  registry: ghcr.io/flamingo-stack/meshcentral
  repository: meshcentral
  tag: "latest"
  pullPolicy: Always
initImage:
  registry: ghcr.io/flamingo-stack/registry
  repository: mongo
  tag: "8.0.9"


# -- Sensitive credentials.
# If existingSecret is set, the chart reads MESH_USER / MESH_PASS / MESH_CONFIG_KEY
# from that Secret using the *Key fields below. Otherwise the chart creates its
# own Secret populated from the *Value fields.
credentials:
  existingSecret: ""
  meshUserKey: "MESH_USER"
  meshPassKey: "MESH_PASS"
  meshConfigKeyKey: "MESH_CONFIG_KEY"

  meshUserValue: ""
  meshPassValue: ""
  meshConfigKeyValue: ""


# -- MeshCentral config.json contents
# Ref: https://github.com/Ylianst/MeshCentral/blob/master/meshcentral-config-schema.json
config:
  settings:
    # Auto-sync cert/config files between datapath and the database on startup.
    # Required for stateless (emptyDir) deployments so server identity survives
    # pod restarts. Needs credentials.meshConfigKey set (becomes --configkey).
    autoSyncConfigFiles: true
    plugins:
      enabled: true
      list:
        - openframe
    mongodb: ""  # Set via --set or values override
    dbExpire:
      events: 157680000
    port: 8383
    aliasPort: 443
    tlsOffload: true
    redirPort: 0
    AgentPong: 300
    AllowFraming: true
    AllowLoginToken: true
    # Required behind TLS-terminating ingress: agents pin the MC TLS cert hash
    # and see the ingress cert instead, so the hash check would block every
    # connection. Not a security downgrade in this topology.
    IgnoreAgentHashCheck: true
    meshAgentBinaries:
      darwin-x64:
        compile: true
        force: true
      darwin-arm64:
        compile: true
        force: true
  domains:
    "":
      title: MeshCentral
      title2: MeshCentral
      minify: true
      NewAccounts: false
      allowedOrigin: true
    openframe_public:
      share: /opt/mesh/public

deploymentAnnotations: {}
podAnnotations: {}

# -- Tenant domain name for this MeshCentral instance.
# Each pod should have a unique value when sharing a single MongoDB database.
# Corresponds to the key in config.domains. Leave empty for default domain.
meshDomain: "test_domain"

revisionHistoryLimit: 10

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "300m"

startupProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 30
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 6
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
