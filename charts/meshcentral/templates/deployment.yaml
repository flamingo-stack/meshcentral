apiVersion: apps/v1
kind: Deployment
metadata:
  name: meshcentral
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}

  strategy:
    type: Recreate

  selector:
    matchLabels:
      {{- include "meshcentral.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        checksum/env: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "meshcentral.selectorLabels" . | nindent 8 }}

    spec:
      initContainers:
        - name: wait-mongodb
          image: "{{ .Values.initImage.registry }}/{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["timeout", "300", "sh", "-c", "until mongosh '{{ .Values.config.settings.mongodb }}' --quiet --eval 'rs.status()' >/dev/null 2>&1; do sleep 5; done"]

        - name: meshcentral-init
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              : "${MESH_DIR:?}" "${MESH_TEMP_DIR:?}" "${MESH_INSTALL_DIR:?}" "${MESH_CONFIG_KEY:?}"

              DATAPATH="${MESH_DIR}/meshcentral-data"
              CONFIG_FILE=/tmp/config/config.json

              # Symlink plugin from read-only image layer; pluginHandler.js hardcodes
              # {datapath}/plugins. Target defined by docker/Dockerfile COPY plugins/.
              mkdir -p "${DATAPATH}/plugins"
              ln -sfn "${MESH_TEMP_DIR}/plugins/openframe" "${DATAPATH}/plugins/openframe"

              # --launch 1 bypasses the parent/child auto-restart monitor so sync failures
              # surface to bash instead of looping. </dev/zero keeps stdin open — with
              # --launch, mainStart exits on stdin 'end' (meshcentral.js:4545), which fires
              # immediately in k8s and skips the sync. `timeout` bounds Mongo stalls.
              echo "[init] syncing cert/config files with database..."
              timeout "${SYNC_TIMEOUT:-600}" \
                node "${MESH_INSTALL_DIR}/meshcentral/meshcentral.js" \
                  --launch 1 \
                  --datapath "${DATAPATH}" \
                  --configfile "${CONFIG_FILE}" \
                  --configkey "${MESH_CONFIG_KEY}" \
                  --syncconfigfiles \
                </dev/zero

              echo "[init] running OpenFrame migration..."
              timeout "${MIGRATE_TIMEOUT:-300}" \
                node "${MESH_TEMP_DIR}/plugins/openframe/migrate.js" \
                  --datapath "${DATAPATH}" \
                  --configfile "${CONFIG_FILE}"
          envFrom:
            - configMapRef:
                name: meshcentral
            - secretRef:
                name: meshcentral-credentials
          volumeMounts:
            - name: data
              mountPath: /opt/mesh
            - name: config
              mountPath: /tmp/config
              readOnly: true

      containers:
        - name: meshcentral
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["node"]
          args:
            - "/opt/meshcentral/meshcentral/meshcentral.js"
            - "--datapath"
            - "/opt/mesh/meshcentral-data"
            - "--configfile"
            - "/tmp/config/config.json"
            - "--configkey"
            - "$(MESH_CONFIG_KEY)"
          ports:
            - containerPort: {{ .Values.config.settings.port | default 4430 }}
              name: http

          envFrom:
            - configMapRef:
                name: meshcentral
            - secretRef:
                name: meshcentral-credentials

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          startupProbe:
            httpGet:
              path: /health.ashx
              port: http
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health.ashx
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health.ashx
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: 3
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}

          volumeMounts:
            - name: data
              mountPath: /opt/mesh
            - name: config
              mountPath: /tmp/config
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: meshcentral-config
        - name: data
          emptyDir: {}
